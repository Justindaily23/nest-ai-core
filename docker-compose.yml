services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nest_ai_core_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Explicit variables match your external environment strings perfectly
      test: 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB'
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nest_ai_core_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  db_migrations:
    image: pgvector/pgvector:pg16
    container_name: nest_ai_core_migrations
    env_file:
      - .env
    networks:
      - default
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./src/core/database/migrations:/migrations
    entrypoint: ['/bin/sh', '-c']
    # FIXED: JSON array format completely isolates variables from Docker Compose parsing
    command:
      - |
        for file in /migrations/*.sql; do
          echo "Executing: $$file"
          psql -h postgres -U "$${DB_USERNAME}" -d "$${DB_NAME}" -f "$$file" || exit 1
        done
        echo "All discovered migrations processed successfully!"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_ai_core_api
    restart: unless-stopped
    command: pnpm run start:dev
    env_file:
      - .env
    environment:
      - NPM_CONFIG_CONFIRM_MODULES_PURGE=false
      - CI=true
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db_migrations:
        condition: service_completed_successfully
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    driver: bridge
